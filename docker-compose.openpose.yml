# Optional, heavy build. This replaces the lightweight MediaPipe API image with
# an image that compiles OpenPose. Build can take a long time and requires NVIDIA
# Container Toolkit for GPU execution.
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSE_BACKEND: openpose
      OPENPOSE_BIN: /opt/openpose/build/examples/openpose/openpose.bin
      OPENPOSE_MODEL_FOLDER: /opt/openpose/models
      OPENPOSE_MODEL_POSE: BODY_25
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
