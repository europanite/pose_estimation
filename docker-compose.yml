services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSE_BACKEND: ${POSE_BACKEND:-mediapipe}
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      EXPO_PUBLIC_POSE_API_URL: ${EXPO_PUBLIC_POSE_API_URL:-http://localhost:8000}
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
    ports:
      - "8081:8081"
    depends_on:
      - backend
    command: npm run web
